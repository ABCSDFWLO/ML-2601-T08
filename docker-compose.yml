version: '3.8'

services:
  drc_solver_env:
    build:
      context: ./learned-planner
    container_name: drc_solver_env
    volumes:
      - ./learned-planner:/workspace
      - ./boxoban-levels:/opt/sokoban_cache/boxoban-levels-master
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python /workspace/daemon_solver.py

  thinker_solver_env:
    build:
      context: ./thinker
    container_name: thinker_solver_env
    ipc: host  # Ray 프레임워크의 공유 메모리 활용을 위해 필수
    volumes:
      - ./thinker:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python /workspace/daemon_thinker.py