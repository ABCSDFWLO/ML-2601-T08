version: '3.8'

services:
  drc_solver_env:
    build:
      context: ./learned-planner
    container_name: drc_solver_env
    volumes:
      - ./learned-planner:/workspace
      - ./boxoban-levels:/opt/sokoban_cache/boxoban-levels-master
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python /workspace/daemon_solver.py

  thinker_solver_env:
    build:
      context: ./thinker
    container_name: thinker_solver_env
    ipc: host
    volumes:
      # ./thinker 폴더 전체를 /workspace로 마운트 (내부의 csokoban, thinker, trained 모두 포함)
      - ./thinker:/workspace
    environment:
      # [핵심 수정] PYTHONPATH에 /workspace/thinker를 명시적으로 추가하여 모듈 인식 오류 해결
      - PYTHONPATH=/workspace/csokoban:/workspace/thinker:$PYTHONPATH
      - RAY_OBJECT_STORE_ALLOW_SLOW_STORAGE=1
      - GRPC_POLL_STRATEGY=poll
      - GRPC_ENABLE_FORK_SUPPORT=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # [핵심 수정] 정확한 하위 폴더로 진입하여 각각 빌드(build_ext) 수행 후, 루트로 빠져나와 데몬 실행
    command: >
      bash -c "
      cd /workspace/csokoban && pip install -e . &&
      cd /workspace/thinker && python setup.py build_ext --inplace &&
      cd /workspace && python daemon_thinker.py
      "